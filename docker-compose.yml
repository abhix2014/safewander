version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: safewander-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DB_PATH=/data/safewander.db
    volumes:
      - safewander-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safewander-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://backend:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: safewander-postgres
    environment:
      - POSTGRES_USER=safewander
      - POSTGRES_PASSWORD=safewander
      - POSTGRES_DB=safewander
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safewander-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  safewander-data:
  postgres-data:
  redis-data:
